<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Eletrônicos</title>
    <meta name="description"
        content="Nextron - Sua loja online de eletrônicos. Encontre os melhores produtos com ofertas exclusivas. Compre agora e transforme sua rotina com tecnologia de ponta!">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/componentes/header.css">
    <link rel="stylesheet" href="css/componentes/footer.css">
    <link rel="stylesheet" href="css/componentes/hero.css">
    <link rel="stylesheet" href="css/componentes/newsletter.css">
    <link rel="stylesheet" href="css/componentes/panel.css">
    <link rel="stylesheet" href="css/componentes/product-card.css">
    <link rel="stylesheet" href="css/componentes/product-grip.css">
</head>

<body>

    <header class="header">
        <!-- Logo e navegação -->
        <h1 class="logo">
            <a href="">
                <img src="./images/logo/logonex.png" alt="nextron - produtos eletrônicos">
            </a>
        </h1>
        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Categorias</a></li>
                <li><a href="#">Ofertas</a></li>
            </ul>
        </nav>

        <nav class="nav-right" aria-label="Menu de Acesso Rápido">
            <ul>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
                <li>
                    <a href="#" aria-label="Conta"><img src="./images/icons/user.svg" alt="Conta"></a>
                </li>
                <li>
                    <a href="#" aria-label="Ajuda"><img src="./images/icons/help.svg" alt="Ajuda"></a>
                </li>
                <li>
                    <a href="#" aria-label="Carrinho"><img src="./images/icons/bag.svg" alt="Carrinho"></a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <!-- Hero section -->
            <div class="hero-overlay">


                <div class="hero-content">
                    <span class="hero-subtitle">
                        Nextron Prime
                    </span>
                    <h2 class="hero-title">Transforme sua rotina com tecnologia.</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver Mais</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="categories-section">
            <!-- Categorias de eletrônicos -->
                <div class="category-card notebook">
                    <a class="category-link" href="#">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outline">Notebooks</span>
                    </a>
                </div>

                <div class="category-card smartphone">
                    <a class="category-link" href="#">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outline">Smartphones</span>
                    </a>
                </div>

                <div class="category-card smart-tv">
                    <a class="category-link" href="#">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outline">Smart TVs</span>
                    </a>
                </div>

                <div class="category-card acessorios">
                    <a class="category-link" href="#">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outline">Acessórios</span>
                    </a>
                </div>
        </section>

        <section class="featured-products">
            <!-- Grid de produtos em destaque -->
        </section>
    </main>

    <footer class="main-footer">
        <!-- Informações de contato e links -->
    </footer>
</body>

</html>
